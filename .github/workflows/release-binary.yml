# Build and upload binary artifacts for releases
#
# This workflow triggers when a new release is published.
# It builds native libraries and example binaries for multiple platforms.

name: Release Binaries

on:
  release:
    types:
      - published
      - created
      - prereleased
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.get_release.outputs.tag_name }}
      upload_url: ${{ steps.get_release.outputs.upload_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get release
        id: get_release
        uses: bruceadams/get-release@v1.3.2
        # Skip if not in the official repository
        if: github.repository == 'parsanol/parsanol-rs'
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # ============================================================================
  # Linux Builds
  # ============================================================================
  linux:
    name: Linux (${{ matrix.target }})
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.upload_url != ''
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            strip: x86_64-linux-gnu-strip
          - target: aarch64-unknown-linux-gnu
            strip: aarch64-linux-gnu-strip
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build library
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release --target ${{ matrix.target }}

      - name: Prepare artifacts
        run: |
          mkdir -p out
          cp target/${{ matrix.target }}/release/libparsanol.rlib out/ 2>/dev/null || true
          # Copy example binaries
          for bin in target/${{ matrix.target }}/release/examples/*; do
            if [ -f "$bin" ] && [ -x "$bin" ]; then
              cp "$bin" out/
            fi
          done
          cp README.md LICENSE out/ 2>/dev/null || true
          cd out && tar -czvf parsanol-${{ matrix.target }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          asset_name: parsanol-${{ matrix.target }}.tar.gz
          asset_path: out/parsanol-${{ matrix.target }}.tar.gz
          upload_url: ${{ needs.prepare.outputs.upload_url }}
          asset_content_type: application/gzip

  # ============================================================================
  # macOS Builds
  # ============================================================================
  macos:
    name: macOS (${{ matrix.target }})
    permissions:
      contents: write
    runs-on: macos-latest
    needs: prepare
    if: needs.prepare.outputs.upload_url != ''
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: x86_64
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build library
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release --target ${{ matrix.target }}

      - name: Prepare artifacts
        run: |
          mkdir -p out
          # Copy example binaries
          for bin in target/${{ matrix.target }}/release/examples/*; do
            if [ -f "$bin" ] && [ -x "$bin" ]; then
              cp "$bin" out/
            fi
          done
          cp README.md LICENSE out/
          cd out && tar -czvf parsanol-${{ matrix.target }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          asset_name: parsanol-${{ matrix.target }}.tar.gz
          asset_path: out/parsanol-${{ matrix.target }}.tar.gz
          upload_url: ${{ needs.prepare.outputs.upload_url }}
          asset_content_type: application/gzip

  # ============================================================================
  # Windows Builds
  # ============================================================================
  windows:
    name: Windows
    permissions:
      contents: write
    runs-on: windows-latest
    needs: prepare
    if: needs.prepare.outputs.upload_url != ''
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build library
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p out
          # Copy example binaries
          for bin in target/release/examples/*.exe; do
            if [ -f "$bin" ]; then
              cp "$bin" out/
            fi
          done
          cp README.md LICENSE out/
          cd out && 7z a -tzip parsanol-x86_64-windows.zip *

      - name: Upload artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          asset_name: parsanol-x86_64-windows.zip
          asset_path: out/parsanol-x86_64-windows.zip
          upload_url: ${{ needs.prepare.outputs.upload_url }}
          asset_content_type: application/zip

  # ============================================================================
  # WASM Build
  # ============================================================================
  wasm:
    name: WebAssembly
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.upload_url != ''
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Build WASM package
        run: wasm-pack build --target web --features wasm

      - name: Prepare artifacts
        run: |
          mkdir -p out
          cp -r pkg/* out/
          cp README.md LICENSE out/
          cd out && tar -czvf parsanol-wasm.tar.gz *

      - name: Upload artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          asset_name: parsanol-wasm.tar.gz
          asset_path: out/parsanol-wasm.tar.gz
          upload_url: ${{ needs.prepare.outputs.upload_url }}
          asset_content_type: application/gzip
