# Release pipeline for parsanol-rs
#
# This workflow handles publishing to crates.io.
# It does NOT create release PRs.
# Releases are created directly when changes are pushed to main.
#
# See: https://release-plz.dev/docs/config

name: Release

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - main

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.PARSANOL_CI_PAT_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Trigger website rebuild after successful release
  trigger-docs:
    name: Trigger Docs Rebuild
    runs-on: ubuntu-latest
    needs: release-plz
    if: success()
    steps:
      - name: Trigger parsanol.github.io rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PARSANOL_CI_PAT_TOKEN }}
          repository: parsanol/parsanol.github.io
          event-type: parsanol-rs-update
          client-payload: |
            {
              "version": "${{ github.sha }}",
              "ref": "${{ github.ref }}",
              "message": "Triggered by parsanol-rs release"
            }
