# Release-plz pipeline for publishing
# a new GitHub + crates.io release
#
# This workflow runs release-plz to handle versioning and publishing.
# It's does NOT create release PRs.
#
# See: https://release-plz.dev/docs/config

permissions:
  pull-requests: write
  contents: write
  id-token: write

on:
  push:
    branches:
      - main

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use the PAT token here to allow triggering other
          # pipelines (e.g. binary builds) after release.
          token: ${{ secrets.PARSANOL_CI_PAT_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        env:
          # Use the PAT token for creating releases and PRs
          # This is required because the default GITHUB_TOKEN doesn't have
          # write permissions
          GITHUB_TOKEN: ${{ secrets.PARSANOL_CI_PAT_TOKEN }}
          # Token for crates.io publishing
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
