# Release pipeline for parsanol-rs
#
# This workflow handles publishing to crates.io.
# It does NOT create release PRs.
# Releases are created directly when changes are pushed to main.
#
# See: https://release-plz.dev/docs/config

name: Release

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - main

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Test token permissions
        env:
          GH_TOKEN: ${{ secrets.PARSANOL_CI_PAT_TOKEN }}
        run: |
          echo "Testing token permissions..."
          gh auth status
          gh repo view --json name,owner
          echo "Testing branch creation permission..."
          MAIN_SHA=$(gh api repos/${{ github.repository }}/git/refs/heads/main --jq '.object.sha')
          echo "Main branch SHA: $MAIN_SHA"

          echo "Testing branch CREATION (will create and delete a test branch)..."
          TEST_BRANCH="test-perm-$(date +%s)"
          gh api --method POST repos/${{ github.repository }}/git/refs \
            -f ref="refs/heads/${TEST_BRANCH}" \
            -f sha="$MAIN_SHA"
          echo "Branch ${TEST_BRANCH} created successfully!"

          echo "Cleaning up test branch..."
          gh api --method DELETE "repos/${{ github.repository }}/git/refs/heads/${TEST_BRANCH}"
          echo "Test branch deleted successfully!"

      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.PARSANOL_CI_PAT_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
