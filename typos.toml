# Configuration for typos spell checker
# See: https://github.com/crate-ci/typos

# Files to check
[files]
extend-exclude = ["target/", ".git/"]

# Custom words that typos should ignore
[default.extend-words]
# Project-specific terms
parsanol = "parsanol"
Parsanol = "Parsanol"

# ISO-8601 duration format (PnYnMnDTnHnMnS)
Pn = "Pn"

# Rust/code terms
eval = "eval"
expr = "expr"
ast = "ast"
lexer = "lexer"
lexers = "lexers"
parsers = "parsers"
parseable = "parseable"
memoization = "memoization"
packrat = "packrat"
alloc = "alloc"

# Documentation terms
adoc = "adoc"
asciidoc = "asciidoc"
AsciiDoc = "AsciiDoc"

# Common abbreviations in code
serde = "serde"
clippy = "clippy"
rustfmt = "rustfmt"
wasm = "wasm"
ffi = "ffi"
